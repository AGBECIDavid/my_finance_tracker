<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FinanceFlow | {{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] shadow-2xl shadow-blue-100 dark:shadow-none w-full max-w-md border border-slate-100 dark:border-slate-700">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 {% if 'revenu' in title|lower %}bg-emerald-500{% else %}bg-rose-500{% endif %} rounded-2xl flex items-center justify-center text-white text-2xl mx-auto mb-4 shadow-lg">
                <i class="fa-solid {% if 'revenu' in title|lower %}fa-arrow-trend-up{% else %}fa-arrow-trend-down{% endif %}"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tighter">{{ title }}</h2>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Enregistrement financier</p>
        </div>
        
        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            {% for field in form %}
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-4">{{ field.label }}</label>
                <div class="mt-1">
                    {{ field }}
                </div>
                {% if field.errors %}
                    <p class="text-rose-500 text-[10px] font-bold mt-2 ml-4">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="pt-6 flex flex-col gap-4">
                <button type="submit" class="w-full {% if 'revenu' in title|lower %}bg-emerald-500 hover:bg-emerald-600{% else %}bg-rose-500 hover:bg-rose-600{% endif %} text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg transition-all transform hover:scale-[1.02] active:scale-95">
                    Confirmer l'opération
                </button>
                <a href="{% url 'dashboard' %}" class="text-center text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-slate-600 transition">
                    <i class="fa-solid fa-chevron-left mr-2"></i> Annuler et revenir
                </a>
            </div>
        </form>
    </div>

    <script>
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.classList.add(
                'w-full', 
                'px-6', 
                'py-4', 
                'bg-slate-50', 
                'dark:bg-slate-700', 
                'border-none', 
                'rounded-2xl', 
                'font-bold', 
                'text-sm', 
                'outline-none', 
                'focus:ring-2', 
                '{% if "revenu" in title|lower %}focus:ring-emerald-500{% else %}focus:ring-rose-500{% endif %}',
                'transition-all'
            );
        });
    </script>
</body>
</html>
