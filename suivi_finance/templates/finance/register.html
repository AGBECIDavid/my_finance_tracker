<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FinanceFlow | Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; }
        .input-net {
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s ease-in-out;
        }
        .input-net:focus {
            border-color: #10b981;
            background: #fff !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .password-toggle { cursor: pointer; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full p-8 bg-white rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-slate-900 uppercase">Rejoindre</h1>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2 font-mono text-emerald-500">Création de profil financier</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            {% for field in form %}
            <div class="input-group relative">
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">{{ field.label }}</label>
                <div class="relative">
                    {{ field }}
                    {% if "password" in field.name %}
                    <span class="password-toggle absolute right-4 top-1/2 -translate-y-1/2 text-slate-300" onclick="togglePassword(this)">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                    {% endif %}
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg shadow-emerald-100 transition-all transform active:scale-95 uppercase tracking-widest text-xs mt-4">
                Créer mon compte <i class="fa-solid fa-user-plus ml-2 text-[10px]"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'login' %}" class="text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-emerald-500 transition">
                Déjà membre ? <span class="text-emerald-500">Se connecter</span>
            </a>
        </div>
    </div>

    <script>
        document.querySelectorAll('input').forEach(input => {
            input.className = "input-net w-full bg-slate-50 rounded-xl py-3.5 px-4 outline-none font-bold text-slate-700 text-sm placeholder-slate-300";
        });

        function togglePassword(button) {
            const input = button.parentElement.querySelector('input');
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
