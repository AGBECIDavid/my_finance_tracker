<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FinanceFlow | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; }
        .input-group:focus-within label { color: #2563eb; }
        .input-net {
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s ease-in-out;
        }
        .input-net:focus {
            border-color: #2563eb;
            background: #fff !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .password-toggle {
            cursor: pointer;
            transition: color 0.2s;
        }
        .password-toggle:hover { color: #2563eb; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full p-8 bg-white rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-slate-900 uppercase">Connexion</h1>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2 font-mono">Accédez à votre coffre-fort</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            {% for field in form %}
            <div class="input-group relative">
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">{{ field.label }}</label>
                <div class="relative">
                    {{ field }}
                    {% if "password" in field.name %}
                    <span class="password-toggle absolute right-4 top-1/2 -translate-y-1/2 text-slate-300" onclick="togglePassword(this)">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                    {% endif %}
                </div>
                {% if field.errors %}
                    <p class="text-rose-500 text-[9px] font-bold mt-2 ml-1 uppercase italic">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-100 transition-all transform active:scale-95 uppercase tracking-widest text-xs mt-4">
                Entrer <i class="fa-solid fa-unlock-keyhole ml-2 text-[10px]"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'register' %}" class="text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-blue-600 transition">
                Pas de compte ? <span class="text-blue-600">S'inscrire</span>
            </a>
        </div>
    </div>

    <script>
        // Rendre les inputs nets
        document.querySelectorAll('input').forEach(input => {
            input.className = "input-net w-full bg-slate-50 rounded-xl py-3.5 px-4 outline-none font-bold text-slate-700 text-sm placeholder-slate-300";
        });

        // Fonction pour afficher/masquer le mot de passe
        function togglePassword(button) {
            const input = button.parentElement.querySelector('input');
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
